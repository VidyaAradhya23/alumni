name: Alumni Platform CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install --legacy-peer-deps

      - name: Verify Web Build
        run: npm run build

  deploy-vercel:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate & Trigger Production Deploy
        run: |
          echo "✅ CI/CD Pipeline passed build verification!"
          echo "🚀 Vercel Git Integration automatically deploys production build to Vercel."
